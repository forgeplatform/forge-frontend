server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Static assets — long cache
    location /static/forge/ {
        alias /usr/share/nginx/html/static/forge/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — serve index for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
